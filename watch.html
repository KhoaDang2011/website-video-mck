<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem Video - MyTube</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-left">
            <a href="index.html" class="back-button"><i class="fas fa-arrow-left"></i></a>
            <img src="logo.png" alt="Logo" class="logo">
        </div>
        <div class="nav-center">
            <div class="search-box">
                <input type="text" placeholder="Tìm kiếm">
                <button><i class="fas fa-search"></i></button>
            </div>
        </div>
        <div class="nav-right">
            <i class="fas fa-video"></i>
            <i class="fas fa-bell"></i>
            <div class="user-avatar"></div>
        </div>
    </header>

    <main class="watch-container">
        <div class="video-player-section">
            <div class="video-player">
                <video controls autoplay width="100%">
                    <!-- Nguồn video sẽ được thêm bằng JavaScript -->
                </video>
            </div>
            <div class="video-player-info">
                <h2 id="video-title">Tiêu đề Video sẽ được tải ở đây</h2>
                <p id="video-stats">1.2Tr lượt xem • 2 giờ trước</p>
            </div>
            <div class="comments-section">
                <h3>Bình luận</h3>
                <!-- Phần bình luận sẽ được phát triển sau -->
            </div>
        </div>
        <aside class="suggestion-sidebar">
            <!-- Video gợi ý sẽ được tải ở đây -->
        </aside>
    </main>

    <script src="data.js"></script>
    <script src="watch.js"></script>
</body>
</html>
