<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube - Chia sẻ Video</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <i class="fas fa-bars"></i>
            <img src="logo.png" alt="Logo" class="logo">
        </div>
         
        <div class="nav-center">
            <div class="search-box">
                <input type="text" placeholder="Tìm kiếm">
                <button><i class="fas fa-search"></i></button>
            </div>
            <i class="fas fa-microphone mic-icon"></i>
        </div>

        <div class="nav-right">
            <i class="fas fa-video"></i>
            <i class="fas fa-bell"></i>
            <div class="user-avatar"></div>
        </div>
    </header>

    <input type="file" id="upload-input" accept="image/*,video/*" style="display: none;">

    <main class="container">
        <aside class="sidebar">
            <div class="side-link active"><i class="fas fa-home"></i><p>Trang chủ</p></div>
            <div class="side-link"><i class="fab fa-hotjar"></i><p>Thịnh hành</p></div>
            <div class="side-link"><i class="fas fa-compass"></i><p>Khám phá</p></div>
            <div class="side-link"><i class="fas fa-subscriptions"></i><p>Kênh đăng ký</p></div>
            <hr>
            <div class="side-link"><i class="fas fa-book-open"></i><p>Thư viện</p></div>
            <div class="side-link"><i class="fas fa-history"></i><p>Video đã xem</p></div>
            <div class="side-link"><i class="fas fa-clock"></i><p>Xem sau</p></div>
            <div class="side-link"><i class="fas fa-thumbs-up"></i><p>Video đã thích</p></div>
        </aside>

        <section class="video-content">
        </section>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
